services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://localhost:3001}
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-https://placeholder.supabase.co}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-placeholder}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - SUPPLIER_MODE=${SUPPLIER_MODE:-mock}
      - SUPPLIER_A_ENABLED=${SUPPLIER_A_ENABLED:-false}
      - SUPPLIER_A_API_KEY=${SUPPLIER_A_API_KEY:-}
      - SUPPLIER_A_BASE_URL=${SUPPLIER_A_BASE_URL:-}
      - SUPPLIER_A_TIMEOUT_MS=${SUPPLIER_A_TIMEOUT_MS:-8000}
      - SUPPLIER_B_API_KEY=${SUPPLIER_B_API_KEY:-}
      - SUPPLIER_B_BASE_URL=${SUPPLIER_B_BASE_URL:-}
      - SUPPLIER_C_API_KEY=${SUPPLIER_C_API_KEY:-}
      - SUPPLIER_C_BASE_URL=${SUPPLIER_C_BASE_URL:-}
      - SEARCH_CACHE_TTL_SECONDS=${SEARCH_CACHE_TTL_SECONDS:-60}
      - SEARCH_RATE_LIMIT_WINDOW_SECONDS=${SEARCH_RATE_LIMIT_WINDOW_SECONDS:-60}
      - SEARCH_RATE_LIMIT_MAX=${SEARCH_RATE_LIMIT_MAX:-30}
    restart: unless-stopped